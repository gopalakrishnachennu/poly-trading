name: verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.88.0 --profile minimal --component clippy,rustfmt
          rustup default 1.88.0
      - name: Formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace --locked

  tla:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Download pinned TLC
        run: |
          curl --fail --location --silent --show-error \
            --output /tmp/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
          echo "58d44845a37a8d776deaf8cf3a623213b59d311bc0ec287bcdfbe148dd11bb3d  /tmp/tla2tools.jar" \
            | sha256sum --check --strict
      - name: Check capital-reservation model
        working-directory: formal
        run: java -cp /tmp/tla2tools.jar tlc2.TLC -config CapitalReservation.cfg CapitalReservation.tla
      - name: Check cross-feed supervisor model
        working-directory: formal
        run: java -cp /tmp/tla2tools.jar tlc2.TLC -config FeedSupervisor.cfg FeedSupervisor.tla
      - name: Check hourly market-session model
        working-directory: formal
        run: java -cp /tmp/tla2tools.jar tlc2.TLC -config MarketSession.cfg MarketSession.tla
      - name: Check durable session-runtime model
