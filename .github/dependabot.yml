version: 2
updates:
  # Rust workspace dependencies.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # Operator terminal (Next.js) dependencies.
  - package-ecosystem: npm
    directory: "/terminal"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the verify workflow.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
