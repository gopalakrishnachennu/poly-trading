[advisories]
yanked = "deny"
# RUSTSEC-2024-0436: `paste` is unmaintained. It reaches us only transitively
# through `parquet` (research export) and has no safe upgrade available. It is a
# compile-time-only proc-macro with no runtime or security surface. Revisit when
# `parquet` drops the dependency.
ignore = ["RUSTSEC-2024-0436"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# First-party workspace crates depend on each other by path with no version
# requirement, which cargo-deny counts as a wildcard. Allow that for path
# dependencies while still denying wildcard versions on registry crates.
allow-wildcard-paths = true

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LicenseRef-Proprietary",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]

# The workspace crates are first-party and never published; they carry the
# custom LicenseRef-Proprietary identifier allowed above.
[licenses.private]
ignore = true

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
